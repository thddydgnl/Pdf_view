<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF Page Drag Viewer</title>
    <script type="module" src="./main.ts"></script>
  </head>
  <body>
    <div id="app" class="app-shell">
      <header class="topbar">
        <div class="topbar__left">
          <p id="document-name" class="document-meta__title">No PDF loaded</p>
        </div>
        <div class="topbar__center">
          <label class="counter-box counter-box--input" for="current-page-input">
            <input id="current-page-input" type="text" inputmode="numeric" value="0" aria-label="Current page" />
            <span>/</span>
            <span id="total-pages-text">0</span>
          </label>
        </div>
        <div class="topbar__right">
          <button id="open-pdf-button" class="toolbar-button toolbar-button--primary" type="button">Open PDF</button>
        </div>
      </header>

      <main id="viewer" class="viewer">
        <section id="empty-state" class="empty-state">
          <h1>Open a PDF</h1>
        </section>

        <section id="page-list" class="page-list" hidden></section>
      </main>

      <div id="toast" class="toast" hidden></div>
    </div>
  </body>
</html>
